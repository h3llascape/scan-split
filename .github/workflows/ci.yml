name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  # ─── macOS build check (arm64) ────────────────────────────────────────────
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: brew install tesseract leptonica

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download tessdata
        run: make tessdata

      - name: Build
        run: wails build -platform darwin/arm64
        env:
          CGO_CXXFLAGS: -I/opt/homebrew/include
          CGO_LDFLAGS: -L/opt/homebrew/lib

  # ─── Windows build check (amd64) ──────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tesseract + GCC via pre-installed MSYS2
        run: C:\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -Sy mingw-w64-x86_64-gcc mingw-w64-x86_64-tesseract-ocr mingw-w64-x86_64-leptonica"
        shell: cmd

      - name: Add MinGW64 to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
        shell: pwsh

      - name: Download tessdata
        run: |
          New-Item -ItemType Directory -Force -Path internal\ocr\tessdata | Out-Null
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/rus.traineddata" `
            -OutFile internal\ocr\tessdata\rus.traineddata
        shell: pwsh

      - name: Build
        run: wails build -platform windows/amd64
        shell: pwsh
        env:
          CGO_CXXFLAGS: -IC:/msys64/mingw64/include
          CGO_LDFLAGS: -LC:/msys64/mingw64/lib
          CC: C:/msys64/mingw64/bin/gcc.exe
          CXX: C:/msys64/mingw64/bin/g++.exe
