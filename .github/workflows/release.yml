name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Unit tests ───────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache tessdata
        id: cache-tessdata
        uses: actions/cache@v4
        with:
          path: internal/ocr/tessdata
          key: tessdata-rus-fast

      - name: Install system dependencies
        run: sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev

      - name: Download tessdata
        if: steps.cache-tessdata.outputs.cache-hit != 'true'
        run: make tessdata

      - name: Run tests
        # Exclude root package (needs frontend/dist) and cmd/app (same).
        # All meaningful tests live under internal/ and cmd/debug.
        run: go test ./internal/... ./cmd/debug/...

  # ─── macOS (arm64) ────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: brew install tesseract leptonica dylibbundler

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download tessdata
        run: make tessdata

      - name: Build
        run: wails build -platform darwin/arm64
        env:
          CGO_CXXFLAGS: -I/opt/homebrew/include
          CGO_LDFLAGS: -L/opt/homebrew/lib

      - name: Bundle Tesseract libraries into .app
        run: |
          APP=build/bin/scansplit.app
          BIN=$APP/Contents/MacOS/scansplit
          FWDIR=$APP/Contents/Frameworks
          mkdir -p $FWDIR
          dylibbundler -od -b -x $BIN -d $FWDIR -p @executable_path/../Frameworks

      - name: Ad-hoc code sign (suppresses Gatekeeper warning on first launch)
        run: codesign --force --deep --sign - build/bin/scansplit.app

      - name: Zip
        run: cd build/bin && zip -r scansplit-mac-arm64.zip scansplit.app

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: build/bin/scansplit-mac-arm64.zip

  # ─── Windows (amd64) ──────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # windows-latest already ships MSYS2 at C:\msys64 — just install packages
      - name: Install Tesseract + GCC via pre-installed MSYS2
        run: C:\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -Sy mingw-w64-x86_64-gcc mingw-w64-x86_64-tesseract-ocr mingw-w64-x86_64-leptonica mingw-w64-x86_64-ntldd-git"
        shell: cmd

      - name: Add MinGW64 to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
        shell: pwsh

      - name: Download tessdata
        run: |
          New-Item -ItemType Directory -Force -Path internal\ocr\tessdata | Out-Null
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/rus.traineddata" `
            -OutFile internal\ocr\tessdata\rus.traineddata
        shell: pwsh

      - name: Build
        run: wails build -platform windows/amd64
        shell: pwsh
        env:
          CGO_CXXFLAGS: -IC:/msys64/mingw64/include
          CGO_LDFLAGS: -LC:/msys64/mingw64/lib
          CC: C:/msys64/mingw64/bin/gcc.exe
          CXX: C:/msys64/mingw64/bin/g++.exe

      - name: Bundle DLLs (auto-detect via ntldd)
        run: |
          $mingwBin = "C:\msys64\mingw64\bin"
          $outDir   = "build\bin"
          # ntldd -R walks all transitive DLL deps of the exe.
          # We copy only those that live in MinGW64 (skip Windows system DLLs).
          $deps = & "$mingwBin\ntldd.exe" -R "build\bin\scansplit.exe" 2>$null
          foreach ($line in $deps) {
            if ($line -match "=>\s+(.+\.dll)\s+\(") {
              $path = $matches[1].Trim()
              if ($path.StartsWith($mingwBin, [System.StringComparison]::OrdinalIgnoreCase)) {
                Copy-Item $path $outDir -Force
                Write-Host "copied $(Split-Path $path -Leaf)"
              }
            }
          }
        shell: pwsh

      - name: Zip
        run: Compress-Archive -Path build\bin\* -DestinationPath build\bin\scansplit-windows-amd64.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: win-amd64
          path: build/bin/scansplit-windows-amd64.zip

  # ─── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [test, build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-arm64

      - uses: actions/download-artifact@v4
        with:
          name: win-amd64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            scansplit-mac-arm64.zip
            scansplit-windows-amd64.zip
